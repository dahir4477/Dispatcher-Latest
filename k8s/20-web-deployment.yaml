apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-web
  namespace: dispatch
  labels:
    app: dispatch-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dispatch-web
  template:
    metadata:
      labels:
        app: dispatch-web
    spec:
      containers:
        - name: web
          image: REPLACE_WITH_WEB_IMAGE:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: dispatch-web-config
            - secretRef:
                name: dispatch-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

