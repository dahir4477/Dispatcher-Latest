# Requires an Ingress controller (NGINX, ALB, Traefik, etc.). Set ingressClassName accordingly.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dispatch-web
  namespace: dispatch
  labels:
    app.kubernetes.io/name: dispatch-web
    app.kubernetes.io/component: frontend
spec:
  ingressClassName: nginx
  rules:
    - host: dispatch.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dispatch-web
                port:
                  number: 80
  # tls:
