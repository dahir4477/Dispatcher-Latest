apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dispatch-web
  namespace: dispatch
spec:
  rules:
    - host: dispatch.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dispatch-web
                port:
                  number: 80

