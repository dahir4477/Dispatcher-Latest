# Copy to 02-secrets.yaml, replace placeholders, apply (do NOT commit real secrets).
# kubectl apply -f k8s/02-secrets.yaml -n dispatch
#
# MONGODB_URI must match MONGO_INITDB_* credentials and use the mongo Service DNS name.
apiVersion: v1
kind: Secret
metadata:
  name: dispatch-secrets
  namespace: dispatch
  labels:
    app.kubernetes.io/name: dispatch
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "CHANGE_ME_ROOT_USER"
  MONGO_INITDB_ROOT_PASSWORD: "CHANGE_ME_ROOT_PASSWORD"
  # Example: mongodb://CHANGE_ME_ROOT_USER:CHANGE_ME_ROOT_PASSWORD@mongo:27017/dispatch?authSource=admin
  MONGODB_URI: "mongodb://CHANGE_ME_ROOT_USER:CHANGE_ME_ROOT_PASSWORD@mongo:27017/dispatch?authSource=admin"
