# Copy to 02-secrets.yaml and replace values. Do NOT commit real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: dispatch-secrets
  namespace: dispatch
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "root"
  MONGO_INITDB_ROOT_PASSWORD: "root_password"

  # Used by the web API to connect to Mongo (service name: mongo)
  MONGODB_URI: "mongodb://root:root_password@mongo:27017/dispatch?authSource=admin"

