# Test-only Mongo credentials. Copy to 02-secrets.yaml for kubectl, or merge into your secret manager.
# kubectl apply -f k8s/02-secrets.yaml -n dispatch
#
# MONGODB_URI must match MONGO_INITDB_* and use host `mongo` inside the cluster.
apiVersion: v1
kind: Secret
metadata:
  name: dispatch-secrets
  namespace: dispatch
  labels:
    app.kubernetes.io/name: dispatch
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "admin"
  MONGO_INITDB_ROOT_PASSWORD: "Koorajaan"
  MONGODB_URI: "mongodb://admin:Koorajaan@mongo:27017/dispatch?authSource=admin"
