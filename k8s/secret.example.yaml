# Copy to secret.yaml (do not commit real values), then:
# kubectl apply -f k8s/secret.yaml
#
# Or create from CLI:
# kubectl create secret generic dispatch-landing-secrets \
#   --from-literal=NEXT_PUBLIC_SUPABASE_URL='https://xxx.supabase.co' \
#   --from-literal=NEXT_PUBLIC_SUPABASE_ANON_KEY='your-anon-key' \
#   --from-literal=NEXT_PUBLIC_SITE_URL='https://your-domain.com'
apiVersion: v1
kind: Secret
metadata:
  name: dispatch-landing-secrets
type: Opaque
stringData:
  NEXT_PUBLIC_SUPABASE_URL: "https://YOUR_PROJECT.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "YOUR_ANON_KEY"
  NEXT_PUBLIC_SITE_URL: "https://your-production-domain.com"
