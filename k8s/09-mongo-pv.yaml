# Static PersistentVolume for MongoDB (storageClass manual).
# Tune hostPath.path for your nodes, or swap for CSI / cloud disk and matching StorageClass.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-data-pv
  labels:
    app.kubernetes.io/name: mongo
    app.kubernetes.io/component: database
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /data/dispatch-mongo
    type: DirectoryOrCreate
