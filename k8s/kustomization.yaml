# Usage:
#   kubectl apply -k k8s/
# Uses test credentials from 02-secrets.yaml; replace before production.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Each manifest sets metadata.namespace (cluster-scoped resources omit it).
resources:
  - 00-namespace.yaml
  - 01-configmap.yaml
  - 02-secrets.yaml
  - 09-mongo-pv.yaml
  - 10-mongo-pvc.yaml
  - 12-mongo-headless-service.yaml
  - 13-mongo-service.yaml
  - 11-mongo-statefulset.yaml
  - 20-web-deployment.yaml
  - 21-web-service.yaml
  - 30-ingress.yaml
