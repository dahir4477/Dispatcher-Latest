# Run from the project root (folder with package.json):
#   docker compose up --build
#
# This starts two containers:
# - web: Next.js app (port 3000)
# - mongo: MongoDB (port 27017) with a named volume for persistence

services:
  mongo:
    build:
      context: ./docker
      dockerfile: mongo.Dockerfile
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-Koorajaan}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-dispatch}
    volumes:
      - mongo_data:/data/db

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:Koorajaan@mongo:27017/dispatch?authSource=admin}
      MONGODB_DB: ${MONGODB_DB:-dispatch}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}

volumes:
  mongo_data:
